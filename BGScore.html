<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#09090b">
  <title>Presentation Mode</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #09090b;
      color: #fafafa;
    }

    /* ─── Animated background ─── */
    .bg-mesh {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(236, 72, 153, 0.08) 0%, transparent 60%);
      background-size: 200% 200%;
      animation: meshMove 15s ease infinite;
    }
    @keyframes meshMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .bg-noise {
      position: fixed; inset: 0; z-index: 1;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    /* ─── Layout ─── */
    .screen {
      position: relative; z-index: 10;
      height: 100dvh; width: 100vw;
      display: flex; flex-direction: column;
      padding: clamp(20px, 3vh, 40px) clamp(24px, 4vw, 80px);
    }

    /* ─── Top bar ─── */
    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
      margin-bottom: clamp(16px, 3vh, 32px);
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 2.5px;
      color: #a1a1aa;
    }
    .brand-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px rgba(34, 197, 94, 0.3);
      animation: livePulse 2.5s ease infinite;
    }
    @keyframes livePulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }
    .clock {
      font-size: 0.85rem; font-weight: 500;
      color: #71717a; font-variant-numeric: tabular-nums;
      letter-spacing: 1px;
    }

    /* ─── Main content ─── */
    .main {
      flex: 1;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      gap: clamp(24px, 4vh, 48px);
      min-height: 0;
    }

    /* ─── Student header ─── */
    .student-header {
      text-align: center;
      animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .student-label {
      font-size: 0.65rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 4px;
      color: #71717a;
      margin-bottom: 10px;
    }
    .student-name {
      font-size: clamp(1.8rem, 5vw, 3.5rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 0%, #d4d4d8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .student-id {
      font-size: clamp(0.75rem, 1.2vw, 0.95rem);
      color: #52525b;
      margin-top: 8px;
      font-weight: 500;
      letter-spacing: 3px;
    }

    /* ─── Score circle ─── */
    .score-circle-wrap {
      position: relative;
      width: clamp(160px, 22vw, 280px);
      height: clamp(160px, 22vw, 280px);
      flex-shrink: 0;
      animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
    }
    .score-circle-svg {
      position: absolute; inset: 0;
      transform: rotate(-90deg);
    }
    .circle-bg {
      fill: none;
      stroke: rgba(255,255,255,0.06);
      stroke-width: 8;
    }
    .circle-stroke {
      fill: none;
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 1.2s cubic-bezier(0.16, 1, 0.3, 1),
                  stroke 0.8s ease;
    }
    .circle-stroke.processing {
      stroke: #f59e0b;
      animation: dashSpin 2s linear infinite;
    }
    @keyframes dashSpin {
      0% { stroke-dashoffset: 691; }
      100% { stroke-dashoffset: 0; }
    }
    .circle-inner {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .circle-number {
      font-size: clamp(2.2rem, 6vw, 4rem);
      font-weight: 900;
      color: #fff;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      transition: all 0.3s ease;
    }
    .circle-number.pop {
      transform: scale(1.15);
    }
    .circle-label {
      font-size: 0.6rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 3px;
      color: #71717a;
      margin-top: 6px;
    }
    .circle-pct {
      font-size: 0.7rem; font-weight: 600;
      color: #52525b;
      margin-top: 2px;
    }
    .processing-text {
      font-size: 0.75rem; font-weight: 600;
      color: #fbbf24;
      margin-top: 8px;
      letter-spacing: 1px;
      animation: textPulse 1.5s ease infinite;
    }
    @keyframes textPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* ─── Examiner bars ─── */
    .bars-section {
      width: 100%; max-width: 700px;
      animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }
    .bars-title {
      font-size: 0.6rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 3px;
      color: #52525b;
      margin-bottom: 16px;
      text-align: center;
    }
    .bar-row {
      display: flex; align-items: center;
      gap: 14px;
      margin-bottom: 14px;
      opacity: 0;
      animation: barEnter 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes barEnter {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .bar-track {
      flex: 1;
      height: 36px;
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }
    .bar-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1),
                  background-color 0.8s ease;
      position: relative;
      display: flex; align-items: center;
      justify-content: flex-end;
      padding-right: 12px;
      min-width: 0;
    }
    .bar-fill-text {
      font-size: 0.85rem; font-weight: 700;
      color: #fff;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      white-space: nowrap;
      opacity: 0;
      animation: textFade 0.4s ease 0.8s forwards;
    }
    @keyframes textFade {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .bar-label {
      font-size: 0.75rem; font-weight: 600;
      color: #a1a1aa;
      min-width: 80px;
      text-align: right;
      white-space: nowrap;
    }
    .bar-label .check { color: #22c55e; margin-left: 4px; }
    .bar-label .wait { color: #f59e0b; margin-left: 4px; }

    /* ─── Waiting bar (not yet scored) ─── */
    .bar-fill.waiting {
      background: rgba(255,255,255,0.06) !important;
      justify-content: center;
    }
    .bar-fill-text.waiting-text {
      color: #71717a;
      font-size: 0.75rem;
      text-shadow: none;
      font-weight: 500;
    }

    /* ─── Missing examiners list ─── */
    .missing-section {
      text-align: center;
      margin-top: 8px;
      animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
    }
    .missing-label {
      font-size: 0.6rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 2px;
      color: #52525b;
      margin-bottom: 8px;
    }
    .missing-pills {
      display: flex; flex-wrap: wrap;
      justify-content: center; gap: 8px;
    }
    .missing-pill {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.2);
      color: #fbbf24;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      animation: pillPop 0.4s ease;
    }
    @keyframes pillPop {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    /* ─── Status ─── */
    .status {
      text-align: center;
      font-size: 0.7rem; color: #52525b;
      flex-shrink: 0;
      margin-top: clamp(12px, 2vh, 24px);
      animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
    }
    .status-dot {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: #22c55e;
      margin-right: 8px; vertical-align: middle;
      box-shadow: 0 0 4px rgba(34, 197, 94, 0.3);
      animation: livePulse 2.5s ease infinite;
    }

    /* ─── Waiting state ─── */
    .waiting {
      text-align: center;
      animation: fadeUp 0.6s ease;
    }
    .waiting-emoji {
      font-size: clamp(3rem, 8vw, 5rem);
      margin-bottom: 20px;
      opacity: 0.25;
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(3deg); }
    }
    .waiting-title {
      font-size: clamp(1.1rem, 2.5vw, 1.6rem);
      font-weight: 600; color: #a1a1aa;
      margin-bottom: 6px;
    }
    .waiting-sub {
      font-size: clamp(0.75rem, 1.3vw, 0.9rem);
      color: #52525b;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── Responsive ─── */
    @media (max-width: 640px) {
      .main { gap: 20px; }
      .bar-row { gap: 10px; margin-bottom: 10px; }
      .bar-track { height: 32px; border-radius: 8px; }
      .bar-fill { border-radius: 8px; padding-right: 8px; }
      .bar-label { font-size: 0.7rem; min-width: 70px; }
      .score-circle-wrap { width: 140px; height: 140px; }
      .circle-number { font-size: 2rem; }
      .missing-pills { gap: 6px; }
      .missing-pill { padding: 5px 10px; font-size: 0.7rem; }
    }
  <script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbyw2vC9JWBibrjY3y60YxOmhqPfIroHIOoT_bJzuMkp1RVbZO_ThGiWoxJrVtwRT18_rw/exec';

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  document.addEventListener('click', () => {
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }, { once: true });

  function playTone(freq, duration, type = 'sine', vol = 0.08) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }
  function playAllDone() {
    playTone(523, 0.2);
    setTimeout(() => playTone(659, 0.2), 120);
    setTimeout(() => playTone(784, 0.3), 240);
    setTimeout(() => playTone(1047, 0.5), 360);
  }

  async function api(action, payload = {}) {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action, ...payload })
    });
    return res.json();
  }

  let currentStudentId = null;
  let currentTotal = 0;
  let maxTotal = 100;
  let currentExaminerCount = 0;
  let currentExaminerScores = [];
  let lastSnapshot = '';

  let isRevealed = false;
  let fakeNumberTimer = null;
  let justRevealed = false;
  let cachedStudent = null;
  let cachedScoreData = null;
  let cachedScoredCount = 0;
  let cachedTotalActive = 0;

  setInterval(() => {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }, 1000);

  function scoreColor(pct) {
    let r, g, b;
    if (pct <= 0.5) {
      const t = pct * 2;
      r = 220; g = Math.round(50 + (140 * t)); b = 50;
    } else {
      const t = (pct - 0.5) * 2;
      r = Math.round(220 - (170 * t)); g = 190; b = 50;
    }
    return `rgb(${r}, ${g}, ${b})`;
  }

  function snapshotKey(student, scoreData, totalActive) {
    if (!student) return 'waiting';
    const final = scoreData ? (parseFloat(scoreData.final) || 0) : 0;
    const exScores = scoreData ? (scoreData.examinerScores || []) : [];
    return JSON.stringify({
      id: student.id,
      totalActive: totalActive,
      final: Math.round(final * 100) / 100,
      scores: exScores.map(s => Math.round(parseFloat(s) * 100) / 100)
    });
  }

  async function loadPresentation() {
    try {
      const [student, scores, criteria, examiners] = await Promise.all([
        api('getCurrentStudent'),
        api('getScores'),
        api('getCriteria'),
        api('getExaminers')
      ]);

      if (criteria && criteria.length > 0) {
        maxTotal = criteria.reduce((sum, c) => sum + (parseFloat(c.weight) * 100 || 0), 0);
      }

      if (!student) {
        if (currentStudentId !== null) {
          renderWaiting();
          currentStudentId = null;
          currentTotal = 0;
          currentExaminerCount = 0;
          currentExaminerScores = [];
          lastSnapshot = '';
          isRevealed = false;
          if (fakeNumberTimer) { clearInterval(fakeNumberTimer); fakeNumberTimer = null; }
        }
        return;
      }

      const studentScore = scores.find(s => s.id === student.id) || null;
      const examinerScores = studentScore ? (studentScore.examinerScores || []) : [];
      const activeExaminers = examiners.filter(e => e.active);
      const scoredCount = examinerScores.length;
      const totalActive = activeExaminers.length;
      const final = studentScore ? (parseFloat(studentScore.final) || 0) : 0;
      const allDone = scoredCount >= totalActive && totalActive > 0;

      const isNewStudent = currentStudentId !== student.id;
      const snapshot = snapshotKey(student, studentScore, totalActive);
      const hasChanged = snapshot !== lastSnapshot;

      cachedStudent = student;
      cachedScoreData = studentScore;
      cachedScoredCount = scoredCount;
      cachedTotalActive = totalActive;

      if (isNewStudent || !allDone) {
        isRevealed = false;
        if (fakeNumberTimer) { clearInterval(fakeNumberTimer); fakeNumberTimer = null; }
      }

      if (!isNewStudent && !hasChanged) return;

      // Update tracking
      currentStudentId = student.id;
      currentTotal = final;
      currentExaminerCount = scoredCount;
      currentExaminerScores = examinerScores;
      lastSnapshot = snapshot;

      renderStudent(student, studentScore, scoredCount, totalActive, isNewStudent);
    } catch (err) {
      console.error('Failed to load:', err);
    }
  }

  function renderWaiting() {
    document.getElementById('main').innerHTML = `
      <div class="waiting">
        <div class="waiting-emoji">🎤</div>
        <div class="waiting-title">Menunggu peserta</div>
        <div class="waiting-sub">Admin akan memilih siswa berikutnya</div>
      </div>
    `;
    document.getElementById('status').innerHTML =
      '<span class="status-dot"></span>Menunggu penilaian';
  }

  function renderStudent(student, scoreData, scoredCount, totalActive, isNewStudent) {
    const main = document.getElementById('main');
    const statusEl = document.getElementById('status');

    if (fakeNumberTimer) { clearInterval(fakeNumberTimer); fakeNumberTimer = null; }

    const final = scoreData ? scoreData.final : 0;
    const examinerScores = scoreData ? (scoreData.examinerScores || []) : [];
    const allDone = scoredCount >= totalActive && totalActive > 0;

    const pct = maxTotal > 0 ? Math.min(final / maxTotal, 1) : 0;
    const color = isRevealed ? scoreColor(pct) : '#f59e0b';

    const r = 110;
    const circumference = 2 * Math.PI * r;
    const offset = isRevealed ? circumference - (pct * circumference) : circumference * 0.25;

    const didChange = (!isNewStudent && currentTotal !== final && final > 0) || justRevealed;

    // ─── Bars: hide ALL scores until revealed ───
    let barsHtml = '';
    for (let i = 0; i < totalActive; i++) {
      const delay = (i * 0.1).toFixed(2);
      if (i < scoredCount) {
        if (isRevealed) {
          const exScore = examinerScores[i];
          const exPct = maxTotal > 0 ? Math.min(exScore / maxTotal, 1) : 0;
          const exColor = scoreColor(exPct);
          barsHtml += `
            <div class="bar-row" style="animation-delay: ${delay}s">
              <div class="bar-track">
                <div class="bar-fill" id="bar-${i}"
                  style="width: 0%; background: ${exColor};">
                  <span class="bar-fill-text">${Number(exScore).toFixed(1)}</span>
                </div>
              </div>
              <div class="bar-label">Penguji ${i + 1}<span class="check">✓</span></div>
            </div>
          `;
        } else {
          barsHtml += `
            <div class="bar-row" style="animation-delay: ${delay}s">
              <div class="bar-track">
                <div class="bar-fill waiting" style="width: 100%;">
                  <span class="bar-fill-text waiting-text">Penguji ${i + 1} sudah mengirim nilai ✓</span>
                </div>
              </div>
              <div class="bar-label">Penguji ${i + 1}</div>
            </div>
          `;
        }
      } else {
        barsHtml += `
          <div class="bar-row" style="animation-delay: ${delay}s">
            <div class="bar-track">
              <div class="bar-fill waiting" style="width: 100%;">
                <span class="bar-fill-text waiting-text">Menunggu...</span>
              </div>
            </div>
            <div class="bar-label">Penguji ${i + 1}<span class="wait">⏳</span></div>
          </div>
        `;
      }
    }

    const statusText = isRevealed
      ? `${scoredCount} dari ${totalActive} penguji telah menilai`
      : allDone
        ? `Semua penguji telah menilai — Tekan <b>SPASI</b> untuk membuka nilai`
        : `${scoredCount} dari ${totalActive} penguji — Menunggu penilaian`;

    const circleClass = isRevealed ? '' : 'processing';
    const circleNumber = isRevealed
      ? (final > 0 ? Number(final).toFixed(1) : '0')
      : (allDone ? Math.floor(Math.random() * 46 + 50) : '...');
    const circleLabel = 'Nilai Akhir';
    const circlePct = isRevealed
      ? Math.round(pct * 100) + '%'
      : scoredCount + '/' + totalActive;
    const processingText = isRevealed ? '' : '<div class="processing-text">Menunggu nilai</div>';

    main.innerHTML = `
      <div class="student-header">
        <div class="student-label">Peserta Ujian</div>
        <div class="student-name">${escapeHtml(student.name)}</div>
        <div class="student-id">${escapeHtml(student.id)}</div>
      </div>

      <div class="score-circle-wrap">
        <svg class="score-circle-svg" viewBox="0 0 240 240">
          <circle class="circle-bg" cx="120" cy="120" r="${r}"/>
          <circle class="circle-stroke ${circleClass}" cx="120" cy="120" r="${r}"
            stroke="${color}"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="${circumference}"
            id="circleStroke"/>
        </svg>
        <div class="circle-inner">
          <div class="circle-number ${didChange ? 'pop' : ''}" id="circleNum"
            style="color: ${isRevealed ? color : '#fbbf24'}">
            ${circleNumber}
          </div>
          <div class="circle-label">${circleLabel}</div>
          <div class="circle-pct">${circlePct}</div>
          ${processingText}
        </div>
      </div>

      <div class="bars-section">
        <div class="bars-title">Penilaian per Penguji</div>
        ${barsHtml || '<div style="text-align:center;color:#52525b;font-size:0.85rem;">Belum ada penguji aktif</div>'}
      </div>
    `;

    statusEl.innerHTML = `<span class="status-dot"></span>${statusText}`;

    if (!isRevealed && allDone) {
      fakeNumberTimer = setInterval(() => {
        const num = document.getElementById('circleNum');
        if (num) num.textContent = Math.floor(Math.random() * 46 + 50);
      }, 400);
    }

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        if (isRevealed) {
          examinerScores.forEach((exScore, idx) => {
            const exPct = maxTotal > 0 ? Math.min(exScore / maxTotal, 1) : 0;
            const bar = document.getElementById(`bar-${idx}`);
            if (bar) bar.style.width = Math.max(exPct * 100, 3) + '%';
          });
        }
        const stroke = document.getElementById('circleStroke');
        if (stroke) stroke.style.strokeDashoffset = offset;
      });
    });

    if (didChange) {
      setTimeout(() => {
        const num = document.getElementById('circleNum');
        if (num) num.classList.remove('pop');
      }, 400);
    }
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && !isRevealed && cachedStudent && cachedScoredCount >= cachedTotalActive && cachedTotalActive > 0) {
      e.preventDefault();
      isRevealed = true;
      if (fakeNumberTimer) { clearInterval(fakeNumberTimer); fakeNumberTimer = null; }
      justRevealed = true;
      playAllDone();
      renderStudent(cachedStudent, cachedScoreData, cachedScoredCount, cachedTotalActive, false);
      justRevealed = false;
    }
  });

  loadPresentation();
  setInterval(loadPresentation, 5000);
</script>
</body>
</html>
