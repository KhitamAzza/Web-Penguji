<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <title>Live Scoreboard</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { font-size: 16px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      margin: 0; padding: 0;
      background: #0f172a; color: #e2e8f0;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    .header { text-align: center; margin-bottom: 32px; }
    .header h1 {
      margin: 0; font-size: 2.2rem;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
    }
    .header p { margin: 8px 0 0; color: #64748b; font-size: 0.85rem; }

    .table-wrap { overflow-x: auto; }
    .score-table {
      width: 100%; border-collapse: separate; border-spacing: 0 8px;
      min-width: 500px;
    }
    .score-table thead th {
      text-align: left; padding: 14px 16px;
      font-size: 0.7rem; text-transform: uppercase;
      letter-spacing: 0.8px; color: #94a3b8;
      font-weight: 700; border-bottom: 2px solid #334155;
      white-space: nowrap;
    }
    .score-table thead th:last-child,
    .score-table tbody td:last-child { text-align: right; }
    .score-table tbody tr { background: #1e293b; transition: transform 0.2s, background 0.2s; }
    .score-table tbody tr:hover { background: #27354f; transform: scale(1.005); }
    .score-table tbody td { padding: 18px 16px; border: none; vertical-align: middle; }
    .score-table tbody tr td:first-child { border-radius: 12px 0 0 12px; }
    .score-table tbody tr td:last-child { border-radius: 0 12px 12px 0; }

    .rank { font-size: 1.5rem; font-weight: 800; color: #38bdf8; width: 60px; }
    .rank.gold { color: #fbbf24; }
    .rank.silver { color: #cbd5e1; }
    .rank.bronze { color: #f97316; }
    .student-name { font-size: 1.1rem; font-weight: 600; color: #f1f5f9; }
    .student-id { font-size: 0.75rem; color: #64748b; margin-top: 2px; }
    .subject-score { font-size: 0.9rem; color: #cbd5e1; text-align: right; font-variant-numeric: tabular-nums; }
    .total-score { font-size: 1.6rem; font-weight: 800; color: #4ade80; text-align: right; }

    .empty-state { text-align: center; padding: 60px 20px; color: #64748b; }
    .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.3; }
    .empty-state h3 { margin: 0 0 6px; font-size: 1.2rem; color: #94a3b8; }
    .footer { text-align: center; margin-top: 24px; font-size: 0.75rem; color: #475569; }
    .live-dot { display: inline-block; width: 8px; height: 8px; background: #4ade80; border-radius: 50%; margin-right: 6px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    @media (max-width: 600px) {
      .container { padding: 20px 12px; }
      .header h1 { font-size: 1.6rem; }
      .total-score { font-size: 1.3rem; }
      .student-name { font-size: 0.95rem; }
      .score-table tbody td { padding: 14px 10px; }
    }

    /* ─── FAB SEARCH ─── */
    .fab-search {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1000;
    }
    .fab-btn {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      border: none;
      color: white;
      font-size: 1.4rem;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(56, 189, 248, 0.4);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
    }
    .fab-btn:active { transform: scale(0.92); }
    .fab-btn.active {
      background: #e74c3c;
      box-shadow: 0 4px 20px rgba(231, 76, 60, 0.4);
      transform: rotate(45deg);
    }
    .fab-input-wrap {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 0;
      overflow: hidden;
      transition: width 0.3s ease;
      display: flex;
      align-items: center;
    }
    .fab-input-wrap.open {
      width: 280px;
    }
    .fab-input {
      width: 100%;
      padding: 14px 52px 14px 18px;
      border-radius: 28px;
      border: none;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 1rem;
      outline: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      border: 2px solid #334155;
    }
    .fab-input::placeholder { color: #64748b; }
    .fab-input:focus { border-color: #38bdf8; }
    .fab-clear {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #64748b;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px;
      display: none;
    }
    .fab-input-wrap.open .fab-clear { display: block; }
    .fab-clear:active { color: #e2e8f0; }

    /* Highlight matched rows */
    .score-table tbody tr.hidden-row { display: none; }
    .score-card.hidden-card { display: none; }
    .highlight { background: rgba(56, 189, 248, 0.15) !important; }

  </style>

</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🏆 Live Scoreboard</h1>
      <p><span class="live-dot"></span>Auto-refresh setiap 10 detik</p>
    </div>

    <div id="content">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        <h3>Tidak ada nilai</h3>
        <div>Nilai akan muncul setelah penguji input nilai.</div>
      </div>
    </div>

    <div class="footer">Update terakhir: <span id="lastUpdate">--</span></div>
  </div>


  <!-- FAB Search -->
  <div class="fab-search">
    <div class="fab-input-wrap" id="fabInputWrap">
      <input type="text" class="fab-input" id="fabInput" placeholder="Cari nama siswa..." autocomplete="off">
      <button class="fab-clear" id="fabClear">×</button>
    </div>
    <button class="fab-btn" id="fabBtn">🔍</button>
  </div>

  <script>
    // ═══════════════════════════════════════════════════
    // CONFIG - Replace with your Apps Script Web App URL
    // ═══════════════════════════════════════════════════
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyw2vC9JWBibrjY3y60YxOmhqPfIroHIOoT_bJzuMkp1RVbZO_ThGiWoxJrVtwRT18_rw/exec';

    async function api(action, payload = {}) {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ action, ...payload })
      });
      return res.json();
    }

    async function loadScores() {
      try {
        const data = await api('getReport');
        renderScores(data);
        document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
      } catch (err) {
        console.error('Failed to load scores:', err);
      }
    }

    function renderScores(scores) {
      const container = document.getElementById('content');
      if (!scores || scores.length === 0) return;

      // Extract subject names from first row
      let subjectNames = [];
      if (scores[0] && scores[0].subjects) {
        subjectNames = Object.keys(scores[0].subjects);
      }

      let html = '<div class="table-wrap"><table class="score-table"><thead><tr>';
      html += '<th style="width:60px;">Rank</th>';
      html += '<th>Nama siswa</th>';
      subjectNames.forEach(subj => {
        html += '<th style="text-align:right;">' + escapeHtml(subj) + '</th>';
      });
      html += '<th style="text-align:right;">Total</th>';
      html += '</tr></thead><tbody>';

      scores.forEach((s, idx) => {
        let rc = '';
        if (idx === 0) rc = 'gold';
        else if (idx === 1) rc = 'silver';
        else if (idx === 2) rc = 'bronze';

        html += '<tr>';
        html += '<td class="rank ' + rc + '">' + s.rank + '</td>';
        html += '<td><div class="student-name">' + escapeHtml(s.name) + '</div><div class="student-id">' + escapeHtml(s.id) + '</div></td>';

        subjectNames.forEach(subj => {
          const val = s.subjects && s.subjects[subj];
          html += '<td class="subject-score">' + (val !== undefined && val !== '' ? val.toFixed(1) : '-') + '</td>';
        });

        html += '<td class="total-score">' + (s.total ? s.total.toFixed(1) : '-') + '</td>';
        html += '</tr>';
      });

      html += '</tbody></table></div>';
      container.innerHTML = html;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }


    // ─── FAB SEARCH ───
    let allScores = [];
    let subjectNamesCache = [];

    const fabBtn = document.getElementById('fabBtn');
    const fabInputWrap = document.getElementById('fabInputWrap');
    const fabInput = document.getElementById('fabInput');
    const fabClear = document.getElementById('fabClear');
    let fabOpen = false;

    fabBtn.addEventListener('click', () => {
      fabOpen = !fabOpen;
      if (fabOpen) {
        fabBtn.classList.add('active');
        fabBtn.textContent = '+';
        fabInputWrap.classList.add('open');
        setTimeout(() => fabInput.focus(), 100);
      } else {
        fabBtn.classList.remove('active');
        fabBtn.textContent = '🔍';
        fabInputWrap.classList.remove('open');
        fabInput.value = '';
        filterScores('');
      }
    });

    fabClear.addEventListener('click', () => {
      fabInput.value = '';
      fabInput.focus();
      filterScores('');
    });

    fabInput.addEventListener('input', (e) => {
      filterScores(e.target.value.trim().toLowerCase());
    });

    fabInput.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        fabBtn.click();
      }
    });

    function filterScores(query) {
      if (!query) {
        document.querySelectorAll('.score-table tbody tr').forEach(tr => tr.classList.remove('hidden-row'));
        document.querySelectorAll('.score-card').forEach(card => card.classList.remove('hidden-card'));
        return;
      }
      document.querySelectorAll('.score-table tbody tr').forEach((tr) => {
        const name = tr.querySelector('.student-name');
        if (name && name.textContent.toLowerCase().includes(query)) {
          tr.classList.remove('hidden-row');
        } else {
          tr.classList.add('hidden-row');
        }
      });
      document.querySelectorAll('.score-card').forEach((card) => {
        const name = card.querySelector('.card-name');
        if (name && name.textContent.toLowerCase().includes(query)) {
          card.classList.remove('hidden-card');
        } else {
          card.classList.add('hidden-card');
        }
      });
    }

    loadScores();
    setInterval(loadScores, 10000);
  </script>
</body>
</html>
